name: CI (with cache)

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache dependencies (cache-0cfbed1)
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
          key: cache-0cfbed1

      - name: prime-cache-0cfbed1
        run: |
          echo "cache-hit=${{ steps.cache-deps.outputs.cache-hit }}"
          if [ "${{ steps.cache-deps.outputs.cache-hit }}" = "true" ]; then
            echo "Cache HIT for cache-0cfbed1"
          else
            echo "Cache MISS for cache-0cfbed1"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test --if-present
